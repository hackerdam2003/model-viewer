<script>
let checkExist = setInterval(function() {
    const canvas = document.querySelector('canvas');
    if (canvas) {
        clearInterval(checkExist); // Canvas mil gaya, ab check karna band karo
        
        // Button ke liye ek box banana
        const box = document.createElement('div');
        box.style.cssText = 'position:fixed; top:80px; right:15px; z-index:999999; background:rgba(20,20,20,0.85); padding:12px; border-radius:10px; border: 1px solid #444; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);';
        
        const startBtn = document.createElement('button');
        startBtn.innerText = '🔴 Record';
        startBtn.style.cssText = 'background:#4CAF50; color:white; padding:10px 15px; border:none; border-radius:5px; margin-bottom:8px; width:100%; font-weight:bold; font-size:14px;';
        
        const stopBtn = document.createElement('button');
        stopBtn.innerText = '⏹ Save';
        stopBtn.style.cssText = 'background:#f44336; color:white; padding:10px 15px; border:none; border-radius:5px; width:100%; font-weight:bold; font-size:14px; opacity:0.5;';
        stopBtn.disabled = true;

        box.appendChild(startBtn);
        box.appendChild(stopBtn);
        document.body.appendChild(box);

        let mediaRecorder;
        let chunks = [];

        startBtn.onclick = () => {
            const stream = canvas.captureStream(60);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            chunks = [];
            
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            
            mediaRecorder.onstop = () => {
                const url = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
                const a = document.createElement('a');
                a.href = url;
                a.download = 'HuTao_Dance.webm';
                a.click();
            };
            
            mediaRecorder.start();
            startBtn.innerText = '⏳ Recording...';
            startBtn.style.background = '#555';
            startBtn.disabled = true;
            stopBtn.style.opacity = '1';
            stopBtn.disabled = false;
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            startBtn.innerText = '🔴 Record';
            startBtn.style.background = '#4CAF50';
            startBtn.disabled = false;
            stopBtn.style.opacity = '0.5';
            stopBtn.disabled = true;
        };
    }
}, 1500); // Har 1.5 second me check karega
</script>
